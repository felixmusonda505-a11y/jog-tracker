<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jog Tracker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f7fa;
            color: #333;
            text-align: center;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 { margin-bottom: 5px; color: #1a73e8; }
        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            background: #e8f0fe;
            color: #1a73e8;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #eee;
        }
        .stat-value { font-size: 32px; font-weight: bold; color: #111; }
        .stat-label { font-size: 12px; color: #666; text-transform: uppercase; }
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
            margin-bottom: 10px;
        }
        .btn:active { transform: scale(0.98); }
        .btn-start { background-color: #34a853; color: white; }
        .btn-stop { background-color: #ea4335; color: white; display: none; }
        .history-section {
            margin-top: 30px;
            text-align: left;
        }
        .history-item {
            background: #fff;
            border-left: 4px solid #1a73e8;
            padding: 10px;
            margin-bottom: 8px;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Jog Tracker</h1>
    <div id="gps-status" class="status-badge">Waiting for GPS...</div>

    <div class="stats-grid">
        <div class="stat-box">
            <div id="distance" class="stat-value">0.00</div>
            <div class="stat-label">Kilometers</div>
        </div>
        <div class="stat-box">
            <div id="duration" class="stat-value">00:00</div>
            <div class="stat-label">Time Elapsed</div>
        </div>
    </div>

    <button id="start-btn" class="btn btn-start">Start Tracking</button>
    <button id="stop-btn" class="btn btn-stop">Stop & Save Run</button>

    <div class="history-section">
        <h3>Run History</h3>
        <div id="history-list"></div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
